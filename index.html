<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var theme = localStorage.getItem('tetris-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      var skin = localStorage.getItem('tetris-skin') || 'retro';
      document.documentElement.setAttribute('data-skin', skin);
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" title="Cambiar tema claro/oscuro" aria-label="Cambiar tema claro/oscuro"></button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="power-banner" class="hidden"></div>
      </div>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
          <span class="value power-badge hidden" id="next-power"></span>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select" class="skin-select" aria-label="Elegir skin visual">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">PODERES</span>
          <ul>
            <li>💣 Bomba — área 3×3</li>
            <li>⚡ Rayo — fila y columna</li>
            <li>🎨 Tinte — borra un color</li>
            <li>🌐 Gravedad — compacta huecos</li>
            <li>❄️ Congelar — pausa caída 5s</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
